services:
  backend:
    build: { context: ., dockerfile: Dockerfile.backend }
    env_file: backend/.env.example
    volumes:
      - backend-data:/app/uploads
      - backend-db:/app/data
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["80:80"]
    depends_on: [backend]
volumes:
  backend-data: {}
  backend-db: {}
